<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF EE Studio X</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h1>TCF EE Studio X</h1>

    <div class="panel">
      <label>Task</label>

      <div class="task-tabs">
        <button class="task-btn active" data-task="1">Tâche 1</button>
        <button class="task-btn" data-task="2">Tâche 2</button>
        <button class="task-btn" data-task="3">Tâche 3</button>
      </div>
    </div>

    <div class="panel">
      <label>Font Size</label>

      <select id="fontSize">
        <option value="14">Petit</option>
        <option value="16" selected>Normal</option>
        <option value="20">Grand</option>
      </select>
    </div>
  </aside>

  <main id="content">

    <section id="subjectPanel">
      <h2 id="subjectTitle">Sujet</h2>

      <div id="subjectText">
        Chargez un sujet...
      </div>
    </section>

    <section id="editorPanel">

      <div id="wordInfo">
        <span id="wordCount">0 mots</span>
        <span id="limitInfo">60-120</span>
      </div>

      <textarea
        id="editor"
        placeholder="Commencez à écrire..."
      ></textarea>

      <div id="accentBar">
        <button>é</button>
        <button>è</button>
        <button>ê</button>
        <button>à</button>
        <button>ç</button>
        <button>ù</button>
        <button>œ</button>
        <button>«</button>
        <button>»</button>
      </div>

    </section>

  </main>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
